<div class="container">
    <h2>View and Manage Customers</h2>
    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Customer ID</th>
                    <th>Customer Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Company</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>

            <tbody>
                @for(customer of customers; track customer.customerID){
                    <tr>
                        <td>{{ customer.customerID }}</td>
                        <td>{{ customer.customerName }}</td>
                        <td>{{ customer.customerEmail }}</td>
                        <td>{{ customer.customerPhone }}</td>
                        <td>{{ customer.company }}</td>
                        <td>
                            <div
                                class="status-wrapper"
                                [ngClass]="{
                                    'status-active': customer.isActive,
                                    'status-inactive': !customer.isActive
                                }">
                                <select
                                    class="status-select"
                                    [ngClass]="{
                                        'status-active': customer.isActive,
                                        'status-inactive': !customer.isActive
                                    }"
                                    [(ngModel)]="customer.isActive"
                                    (change)="onStatusChange(customer)">
                                    <option [ngValue]="true">Active</option>
                                    <option [ngValue]="false">Inactive</option>
                                </select>
                            </div>
                        </td>

                        <td>
                            <button
                                class="save-btn"
                                [disabled]="!customer.dirty"
                                (click)="updateCustomerStatus(customer)">
                                <img
                                    src="https://img.icons8.com/ios_filled/512w/FFFFFF/save.png"
                                    class="save-icon"
                                    alt="">

                                Save
                            </button>
                        </td>
                    </tr>
                }
            </tbody>
            
        </table>
    </div>
</div>
