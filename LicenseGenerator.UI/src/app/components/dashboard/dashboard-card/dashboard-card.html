<div class="card">
    <div class="left">
        <div class="icon"
            [style.background]="colour +'20'">
            <mat-icon [style.colour]="colour">{{icon}}</mat-icon>
        </div>
        <span class="title"> {{title}} </span>
        <div class="value"> {{value}} </div>
    </div>
</div>
