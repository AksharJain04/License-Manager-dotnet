<div class="cards">

    <app-dashboard-card
        title="Active Licenses:"
        [value]="dashboard.activeLicenses"
        icon="verified"
        colour="#16A34A">
    </app-dashboard-card>

    <app-dashboard-card
        title="Inactive Licenses:"
        [value]="dashboard.inactiveLicenses"
        icon="schedule"
        colour="#6B7280">
    </app-dashboard-card>

    <app-dashboard-card
        title="Suspended Licenses:"
        [value]="dashboard.suspendedLicenses"
        icon="block"
        colour="#D97706">
    </app-dashboard-card>

    <app-dashboard-card
        title="Registered Devices:"
        [value]="dashboard.registeredDevices"
        icon="devices"
        colour="#2563EB">
    </app-dashboard-card>

    <app-dashboard-card
        title="Pending Mappings:"
        [value]="dashboard.pendingMappings"
        icon="receipt_long"
        colour="#9333EA">
    </app-dashboard-card>

    <app-dashboard-card
        title="Total Customers:"
        [value]="dashboard.totalCustomers"
        icon="groups"
        colour="#0891B2">
    </app-dashboard-card>

</div>

<section class="quick-actions">
    <div class="section-heading">
        <h2>Welcome to License Manager!</h2>
        <p>What would you like to do today?</p>
    </div>

    <div class="action-grid">

        <a routerLink="/customer" class="action-card">
            <div class="action-icon customer-icon">
                <mat-icon>person_add</mat-icon>
            </div>
            <div>
                <h3>Add Customer</h3>
                <p>Register new customer</p>
            </div>
        </a>

        <a routerLink="/device" class="action-card">
            <div class="action-icon device-icon">
                <mat-icon>add_to_queue</mat-icon>
            </div>
            <div>
                <h3>Add Device</h3>
                <p>Register a new device</p>
            </div>
        </a>


        <a routerLink="/invoice" class="action-card">
            <div class="action-icon invoice-icon">
                <mat-icon>post_add</mat-icon>
            </div>
            <div>
                <h3>Create Invoice</h3>
                <p>Create a new sales invoice</p>
            </div>
        </a>


        <a routerLink="/license" class="action-card">
            <div class="action-icon license-icon">
                <mat-icon>vpn_key</mat-icon>
            </div>
            <div>
                <h3>Generate License</h3>
                <p>Generate a device license</p>
            </div>
        </a>

    </div>
</section>
