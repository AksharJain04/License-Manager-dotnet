<div class="container mt-4">
    <h2>Generated Licenses</h2>
    <table class ="table table-bordered table striped mt-3">
        <thead> 
            <tr>
                <th>Invoice Number</th>
                <th>Device Model</th>
                <th>Serial Number</th>
                <th>License Key</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let license of licenses">
                <td>{{ license.invoiceNumber }}</td>
                <td>{{ license.deviceModel }}</td>
                <td>{{ license.serialNumber }}</td>
                <td>{{ license.licenseKey }}</td>
                <td>
                    <span
                        [class.text-success] = "license.status === 'Active'"
                        [class.text-danger] = "license.status === 'Inactive'">
                        {{ license.status }}
                    </span>
                </td>
            </tr>
        </tbody>
    </table>
</div>
